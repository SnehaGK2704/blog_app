{% extends "base.html" %}

{% block content %}

<h2>{{ user.name }}'s Posts</h2>

<div class="feed">
    {% for post in posts %}
    <div class="card">
        <img src="https://picsum.photos/300/200?random={{ post.id }}">
        <h3>{{ post.title }}</h3>
        <p>{{ post.body[:80] }}...</p>
        <a href="/post/{{ post.id }}">View Details</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
